<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="雅思" />
  <title>IELTS Master</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <link rel="stylesheet" href="/styles/views.css" />
</head>
<body>
  <!-- 侧边栏导航 (PC) -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🎓</span>
      <span class="logo-text">IELTS Master</span>
    </div>
    <ul class="sidebar-nav" id="sidebarNav"></ul>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </nav>

  <!-- 主内容区 -->
  <main class="main-content" id="mainContent">
    <!-- 顶部栏 (手机) -->
    <header class="topbar" id="topbar">
      <h1 class="topbar-title" id="topbarTitle">总览</h1>
      <button class="topbar-action" id="topbarAction" hidden></button>
    </header>

    <!-- 视图容器 -->
    <div class="view-container" id="viewContainer">
      <div class="view-loading">加载中...</div>
    </div>
  </main>

  <!-- 底部导航 (手机) -->
  <nav class="bottomnav" id="bottomNav">
    <ul class="bottomnav-list" id="bottomNavList"></ul>
  </nav>

  <!-- 工具函数 -->
  <script type="module" src="/js/utils/date.js"></script>
  <script type="module" src="/js/utils/score.js"></script>
  <script type="module" src="/js/utils/vocab-data.js"></script>
  <!-- 核心模块 -->
  <script type="module" src="/js/state.js"></script>
  <script type="module" src="/js/sync.js"></script>
  <!-- 视图模块 -->
  <script type="module" src="/js/views/dashboard.js"></script>
  <script type="module" src="/js/views/plan.js"></script>
  <script type="module" src="/js/views/vocab.js"></script>
  <script type="module" src="/js/views/practice.js"></script>
  <script type="module" src="/js/views/notebook.js"></script>
  <script type="module" src="/js/views/mock.js"></script>
  <script type="module" src="/js/views/settings.js"></script>
  <!-- 入口 -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
